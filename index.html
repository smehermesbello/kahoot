<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar no Quiz</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #46178f; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            text-align: center; 
            width: 300px; 
            color: #333; 
        }
        h1 { 
            color: #46178f; 
            margin-bottom: 20px; 
            font-size: 28px; 
        }
        input { 
            width: 90%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px; 
            text-align: center; 
            font-weight: bold; 
        }
        button { 
            width: 98%; 
            padding: 12px; 
            background-color: #333; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        button:hover { 
            background-color: #222; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz Aula</h1>
    <input type="number" id="pinInput" placeholder="PIN DO JOGO">
    <input type="text" id="usernameInput" placeholder="SEU APELIDO" maxlength="15">
    <button onclick="entrarNaSala()">Inserir</button>
</div>

<!-- Firebase SDK tradicional para rodar direto no navegador -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // Suas credenciais oficiais do Firebase já configuradas aqui:
    const firebaseConfig = {
        apiKey: "AIzaSyD-JQw67r1lrSz-o5DnsdVjVes33EkbsuM",
        authDomain: "quiz-kahoot-hermes.firebaseapp.com",
        databaseURL: "https://quiz-kahoot-hermes-default-rtdb.firebaseio.com",
        projectId: "quiz-kahoot-hermes",
        storageBucket: "quiz-kahoot-hermes.firebasestorage.app",
        messagingSenderId: "735360984913",
        appId: "1:735360984913:web:61e81031e7aec51c035570",
        measurementId: "G-J9R1KRP2R3"
    };
    
    // Inicializa o banco de dados
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Captura o PIN automaticamente caso o aluno entre escaneando o QR Code (?sala=XXXXXX)
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('sala')) {
        document.getElementById('pinInput').value = urlParams.get('sala');
    }

    function entrarNaSala() {
        const pin = document.getElementById('pinInput').value.trim();
        // Limpa o nome para evitar caracteres especiais que quebram o banco
        const username = document.getElementById('usernameInput').value.trim().replace(/[.$#[\]]/g, ""); 

        if(!pin || !username) {
            alert("Por favor, digite o PIN e escolha um Apelido!");
            return;
        }

        // Verifica no Firebase se essa sala existe e está aberta
        database.ref('salas/' + pin).once('value', snapshot => {
            if(!snapshot.exists()) {
                alert("Sala não encontrada! Verifique o PIN na tela do professor.");
            } else {
                // Registra o aluno na sala com os dados zerados
                database.ref('salas/' + pin + '/jogadores/' + username).set({
                    score: 0,
                    ultima_resposta: "",
                    tempo_resposta: 0,
                    ganhouPontosNessaRodada: 0
                }).then(() => {
                    // Manda o aluno para o controle levando as informações na URL
                    window.location.href = `player.html?sala=${pin}&user=${username}`;
                });
            }
        });
    }
</script>
</body>
</html>
